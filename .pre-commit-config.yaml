repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: destroyed-symlinks
      - id: end-of-file-fixer
      - id: mixed-line-ending

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.8.0-1
    hooks:
      - id: shfmt
        args: ["-i", "4"]

  - repo: local
    hooks:
      - id: bashate
        name: Bashate
        entry: bashate
        language: system
        files: \.(sh|bash)$
        args: ["--ignore", "E006,E042"] # ignore line length, local usage is considered

      - id: ruff-check
        name: Ruff check
        entry: ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: Ruff format
        entry: bash -c 'ruff format "$@" && git add "$@"' --
        language: system
        types: [python]
        pass_filenames: true

      - id: sync-readme-commands
        name: Sync README @doc commands
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)" && bash scripts/sync-readme-commands.sh && git add README.md'
        language: system
        files: (config/\.bash_aliases|bin/.*\.sh|scripts/.*\.sh|README\.md)$
        pass_filenames: false

      - id: sync-readme-make
        name: Sync README make output
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)" && bash scripts/sync-readme-make.sh && git add README.md'
        language: system
        files: (Makefile|README\.md)$
        pass_filenames: false

      - id: sync-pm-readme
        name: Sync project_manager README menu
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)/project_manager" && uv run python scripts/update_readme.py && git add README.md'
        language: system
        files: project_manager/(src/project_manager/gtd\.py|README\.md)$
        pass_filenames: false
